<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Happy Birthday</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mrs+Saint+Delafield&family=Petit+Formal+Script&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #d9b46a;
    --gold-bright: #f3d98a;
    --ink: #f5efe0;
    --night: #05060c;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100vw; height: 100vw;
    background: var(--night);
    overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    color: var(--ink);
  }
  #app { position: fixed; inset: 0; }

  /* Background Canvases */
  #sky-canvas, #fx-canvas {
    position: fixed; inset: 0; width: 100%; height: 100%;
    display: block; pointer-events: none;
  }
  #sky-canvas { z-index: 1; }
  #fx-canvas { z-index: 5; }

  /* Tap to Open Gate */
  #gate {
    position: fixed; inset: 0; z-index: 100; background: #000;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; cursor: pointer;
    transition: opacity 1.2s ease;
  }
  #gate-letter {
    width: min(34vw, 150px);
    filter: drop-shadow(0 0 18px rgba(217,180,106,0.25));
    animation: gatepulse 3.2s ease-in-out infinite;
  }
  #gate-caption {
    color: #8a8577; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px;
    letter-spacing: 3px; text-transform: uppercase; opacity: 0.7;
  }
  @keyframes gatepulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }

  /* Title Scene */
  #scene-title {
    position: fixed; inset: 0; z-index: 20;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; text-align: center;
    opacity: 0; pointer-events: none; transition: opacity 1.2s ease;
  }
  #hb-title {
    font-family: 'Mrs Saint Delafield', cursive;
    font-size: clamp(52px, 11vw, 130px);
    color: var(--gold-bright);
    text-shadow: 0 0 25px rgba(243,217,138,0.55);
    opacity: 0; line-height: 1; transition: opacity 1.5s ease;
  }
  #begin-btn {
    margin-top: 40px; padding: 14px 44px;
    background: transparent; border: 1px solid var(--gold);
    color: var(--gold-bright); font-family: 'Cormorant Garamond', serif;
    font-style: italic; font-size: 19px; letter-spacing: 4px;
    border-radius: 999px; cursor: pointer; opacity: 0;
    transform: translateY(10px);
    transition: all 0.8s ease; pointer-events: auto;
  }
  #begin-btn:hover {
    background: rgba(217,180,106,0.15);
    box-shadow: 0 0 25px rgba(217,180,106,0.4);
  }

  /* Me & You Label inside Constellation */
  #me-you-label {
    position: fixed; left: 50%; top: 42%;
    transform: translate(-50%, -50%);
    font-family: 'Playfair Display', serif; font-size: clamp(22px, 4.5vw, 38px);
    color: var(--gold-bright); font-style: italic;
    opacity: 0; z-index: 50; pointer-events: none;
    text-shadow: 0 0 20px rgba(243,217,138,0.9), 0 0 40px rgba(243,217,138,0.5);
    transition: opacity 1s ease;
    white-space: nowrap;
  }

  /* Scenes Container */
  .scene {
    position: fixed; inset: 0; z-index: 15;
    display: none; align-items: center; justify-content: center;
    flex-direction: column; text-align: center; padding: 4vh 4vw;
  }
  .scene.active { display: flex; }

  /* Soul Messages */
  #soul-msg {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-family: 'Playfair Display', serif; font-style: italic;
    font-size: clamp(22px, 4vw, 36px); letter-spacing: 2px; color: rgba(243,217,138,0.95);
    opacity: 0; transition: opacity 1.8s ease; z-index: 210; pointer-events: none;
    text-shadow: 0 0 20px rgba(243,217,138,0.6); text-align: center;
  }
  #soul-msg.show { opacity: 1; }

  /* Cake Scene */
  #scene-cake { z-index: 25; }
  #cake-wrap {
    position: relative; opacity: 0; transform: scale(0.9);
    transition: opacity 1s ease, transform 1s ease;
  }
  #cake-wrap.show { opacity: 1; transform: scale(1); }
  .cake-hint {
    font-family: 'Playfair Display', serif; font-style: italic; font-size: 17px;
    color: rgba(245,239,224,0.85); margin-top: 20px; min-height: 26px;
    text-shadow: 0 0 10px rgba(0,0,0,0.8);
  }
  #cake-svg { width: min(65vw, 360px); height: auto; }

  /* Gentle Flame Flicker */
  .flame {
    transform-origin: 50% 100%;
    animation: gentleFlame 3s ease-in-out infinite alternate;
  }
  @keyframes gentleFlame {
    0%   { transform: translateY(0) scale(1) rotate(-0.5deg); opacity: 0.95; }
    50%  { transform: translateY(-0.5px) scaleY(1.01) rotate(0.5deg); opacity: 1; }
    100% { transform: translateY(0.2px) scaleY(0.99) rotate(-0.2deg); opacity: 0.92; }
  }
  .flame.out { opacity: 0 !important; transform: scale(0) !important; transition: all 0.3s ease !important; }

  /* Celebration Banner */
  #celebration-banner {
    position: fixed; inset: 0; z-index: 90;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; opacity: 0; transition: opacity 0.8s ease; pointer-events: none;
  }
  #celebration-banner.show { display: flex; opacity: 1; }
  .banner-line {
    font-family: 'Playfair Display', serif; font-weight: 700;
    color: #ffffff; letter-spacing: 6px; line-height: 1.25;
    text-shadow: 0 0 25px rgba(255,255,255,0.7), 0 0 50px rgba(243,217,138,0.5);
    font-size: clamp(36px, 8vw, 72px);
  }
  .banner-baby {
    font-family: 'Mrs Saint Delafield', cursive; font-weight: 400;
    color: var(--gold-bright); line-height: 1.1; margin-top: 10px;
    text-shadow: 0 0 30px rgba(243,217,138,0.8);
    font-size: clamp(54px, 11vw, 100px);
  }

  /* Balloons */
  .balloon {
    position: fixed; bottom: -100px; width: 42px; height: 54px;
    border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    animation: floatUp 7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    z-index: 85; pointer-events: none; opacity: 0.85;
    box-shadow: inset -5px -5px 10px rgba(0,0,0,0.15), 0 0 15px rgba(255,255,255,0.3);
  }
  .balloon::after {
    content: ""; position: absolute; left: 50%; top: 100%;
    width: 1px; height: 60px; background: rgba(255,255,255,0.35);
  }
  @keyframes floatUp {
    0% { transform: translateY(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.85; }
    100% { transform: translateY(-120vh) rotate(12deg); opacity: 0; }
  }

  /* Letter Scene */
  #scene-letter { z-index: 30; }
  #letter-scroll {
    max-width: 760px; width: 90vw; max-height: 80vh;
    overflow-y: auto; padding: 2vh 2vw 6vh;
    scrollbar-width: thin; scrollbar-color: rgba(217,180,106,0.4) transparent;
  }
  #letter-box {
    font-family: 'Petit Formal Script', cursive;
    font-size: clamp(18px, 2.2vw, 26px); line-height: 1.85;
    color: #f3e3b0; opacity: 0; transition: opacity 5s ease;
  }
  #letter-box.show { opacity: 1; }
  #letter-box p { margin-bottom: 1.6em; }

  .garland-wrap {
  position: absolute;
  top: 5vh;
  width: 80vw;
  max-width: 600px;
  pointer-events: none;
}
.garland {
  width: 100%;
  height: auto;
  filter: drop-shadow(0 0 10px rgba(243, 217, 138, 0.4));
}

.title-decorations {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.decor-balloon {
  position: absolute;
  width: 38px;
  height: 48px;
  border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
  background: radial-gradient(circle at 30% 30%, #f3d98a, #d9b46a);
  box-shadow: 0 0 15px rgba(243, 217, 138, 0.5);
  animation: floatGentle 4s ease-in-out infinite alternate;
}

.left-balloon { top: 28%; left: 12%; animation-delay: 0s; }
.right-balloon { top: 25%; right: 12%; animation-delay: 1.5s; }

.decor-balloon::after {
  content: "";
  position: absolute;
  left: 50%;
  top: 100%;
  width: 1px;
  height: 45px;
  background: rgba(243, 217, 138, 0.4);
}

@keyframes floatGentle {
  0% { transform: translateY(0) rotate(-3deg); }
  100% { transform: translateY(-12px) rotate(3deg); }
}

  /* Black Overlay */
  #final-black { position: fixed; inset: 0; background: #000; z-index: 200; opacity: 0; pointer-events: none; transition: opacity 2s ease; }
</style>
</head>
<body>

<div id="app">
  <canvas id="sky-canvas"></canvas>
  <canvas id="fx-canvas"></canvas>

  <!-- Tap to Open Gate -->
  <div id="gate">
    <svg id="gate-letter" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
      <rect x="6" y="14" width="188" height="128" rx="4" fill="#f7efd8" stroke="#d9b46a" stroke-width="1.5"/>
      <path d="M6,14 L100,90 L194,14" fill="none" stroke="#c99f5e" stroke-width="1.5"/>
      <circle cx="100" cy="76" r="15" fill="#c9553f"/>
      <text x="100" y="81" text-anchor="middle" font-family="'Mrs Saint Delafield', cursive" font-size="16" fill="#f7efd8">fy</text>
    </svg>
    <div id="gate-caption">Tap to Open</div>
  </div>

  <!-- Title Scene -->
  <div id="scene-title">
    <div class="garland-wrap">
   <svg class="garland" viewBox="0 0 500 80" preserveAspectRatio="none">

    <!-- Triangular Flags -->
    <polygon points="40,18 70,18 55,55" fill="#f3d98a"/>

        </div>
   <div class="title-decorations">

        <path d="M78,240 A122,26 0 0 0 322,240 L316,300 A122,26 0 0 1 84,300 Z" fill="#a97a49"/>
        <path d="M80,215 A120,24 0 0 0 320,215 L318,250 A120,26 0 0 1 82,250 Z" fill="#caa06b"/>
        <ellipse cx="200" cy="215" rx="120" ry="24" fill="#caa06b"/>
        <path d="M92,205 Q92,140 200,132 Q308,140 308,205 Q308,225 200,232 Q92,225 92,205 Z" fill="#fffaf0"/>
        
        <!-- Candles -->
        <rect x="164" y="96" width="6" height="38" rx="2" fill="#FFF8E8"/>
        <rect x="196" y="92" width="6" height="42" rx="2" fill="#FFF8E8"/>
        <rect x="228" y="96" width="6" height="38" rx="2" fill="#FFF8E8"/>

        <!-- Flames -->
        <g id="flame-group">
          <ellipse class="flame" cx="167" cy="90" rx="5" ry="12" fill="#FFE9A8"/>
          <ellipse class="flame" cx="199" cy="86" rx="6" ry="14" fill="#FFE9A8"/>
          <ellipse class="flame" cx="231" cy="90" rx="5" ry="12" fill="#FFE9A8"/>
        </g>
      </svg>
      <div class="cake-hint" id="cake-hint">Make a wish… blow into your microphone.</div>

  <!-- Celebration Banner -->
  <div id="celebration-banner">
    <div class="banner-line">HAPPY</div>
    <div class="banner-line">BIRTHDAY</div>

  </div>

  <!-- Letter Scene -->
  <div class="scene" id="scene-letter">
    <div id="letter-scroll"><div id="letter-box"></div></div>

  <div id="soul-msg"></div>

</div>

<audio id="audio-glue" src="glue-song.mp3.aac" preload="auto"></audio>
<audio id="audio-honeybee" src="honeybee.mp3.aac" preload="auto"></audio>

<script>
const skyCanvas = document.getElementById('sky-canvas');
const fxCanvas = document.getElementById('fx-canvas');
const sctx = skyCanvas.getContext('2d');
const fctx = fxCanvas.getContext('2d');
let W, H;

function resize(){
  W = window.innerWidth; H = window.innerHeight;
  [skyCanvas, fxCanvas].forEach(c=>{ c.width = W; c.height = H; });
}
window.addEventListener('resize', resize);
resize();

// Parallax & Mouse Tracking
const mouse = { x: W / 2, y: H / 2, targetX: W / 2, targetY: H / 2, isDesktop: !('ontouchstart' in window) };

window.addEventListener('mousemove', (e) => {
  if(!mouse.isDesktop) return;
  mouse.targetX = e.clientX;
  mouse.targetY = e.clientY;
  spawnCursorParticles(e.clientX, e.clientY);
});

window.addEventListener('touchmove', (e) => {
  if(e.touches.length > 0){
    spawnCursorParticles(e.touches[0].clientX, e.touches[0].clientY);
  }
});

const state = {
  mainActive: false,
  constellationFormed: false,
  constellationStart: 0,
  constellationReady: false,
  constellationVisible: false,
  firstStarVisible: false,
  moonVisible: false,
  moonAlpha: 0,
  starsCount: 0,
  targetStarsCount: 0,
  auroraActive: false,
  auroraAlpha: 0,
  isCollapsing: false,
  collapseProgress: 0,
  endingConstellationActive: false,
  endingStart: 0,
  endingPoints: []
};

/* Cursor Magic Particles */
let cursorParticles = [];

function spawnCursorParticles(x, y){
  for(let i = 0; i < 3; i++){
    cursorParticles.push({
      x: x + (Math.random() - 0.5) * 10,
      y: y + (Math.random() - 0.5) * 10,
      vx: (Math.random() - 0.5) * 1.2,
      vy: (Math.random() - 0.5) * 1.2 - 0.3,
      r: Math.random() * 2 + 1,
      alpha: 1,
      decay: Math.random() * 0.025 + 0.015,
      color: Math.random() > 0.4 ? 'rgba(243, 217, 138,' : 'rgba(255, 255, 255,'
    });
  }
}

/* Fireworks & Confetti System */
let fireworks = [];
let confetti = [];

function launchSparklerFirework() {
  const x = Math.random() * (W * 0.8) + W * 0.1;
  const targetY = Math.random() * (H * 0.35) + H * 0.15;
  fireworks.push({
    x: x,
    y: H,
    targetY: targetY,
    vy: - (Math.random() * 4 + 7),
    exploded: false
  });
}

function createFireworkExplosion(x, y) {
  const particleCount = 45;
  for (let i = 0; i < particleCount; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    fireworks.push({
      x: x,
      y: y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: Math.random() * 1.8 + 0.8,
      alpha: 1,
      decay: Math.random() * 0.018 + 0.01,
      sparkle: true,
      exploded: true
    });
  }
}

function spawnGoldenConfetti() {
  for (let i = 0; i < 60; i++) {
    confetti.push({
      x: Math.random() * W,
      y: Math.random() * -H * 0.5,
      w: Math.random() * 6 + 4,
      h: Math.random() * 10 + 6,
      vy: Math.random() * 1.5 + 1,
      vx: Math.random() * 1 - 0.5,
      rot: Math.random() * 360,
      vRot: Math.random() * 4 - 2,
      alpha: Math.random() * 0.5 + 0.5,
      color: Math.random() > 0.3 ? '#f3d98a' : '#ffffff'
    });
  }
}

function updateAndDrawFX() {
  fctx.clearRect(0, 0, W, H);

  // 1. Cursor Particles
  for(let i = cursorParticles.length - 1; i >= 0; i--){
    const p = cursorParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.alpha -= p.decay;

    if(p.alpha <= 0){
      cursorParticles.splice(i, 1);
      continue;
    }

    fctx.fillStyle = p.color + p.alpha + ')';
    fctx.shadowColor = 'rgba(243, 217, 138, 0.8)';
    fctx.shadowBlur = 6;
    fctx.beginPath();
    fctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    fctx.fill();
  }
  fctx.shadowBlur = 0;

  // 2. Sparkler Fireworks
  for (let i = fireworks.length - 1; i >= 0; i--) {
    const f = fireworks[i];
    if (!f.exploded) {
      f.y += f.vy;
      fctx.fillStyle = '#ffe9a8';
      fctx.shadowColor = 'rgba(243, 217, 138, 0.9)';
      fctx.shadowBlur = 8;
      fctx.beginPath();
      fctx.arc(f.x, f.y, 2, 0, Math.PI * 2);
      fctx.fill();

      if (f.y <= f.targetY) {
        createFireworkExplosion(f.x, f.y);
        fireworks.splice(i, 1);
      }
    } else {
      f.x += f.vx;
      f.y += f.vy;
      f.vy += 0.03; // Subtle gravity
      f.alpha -= f.decay;

      if (f.alpha <= 0) {
        fireworks.splice(i, 1);
        continue;
      }

      const glow = Math.random() > 0.3 ? f.alpha : f.alpha * 0.4;
      fctx.fillStyle = `rgba(243, 217, 138, ${glow})`;
      fctx.shadowColor = 'rgba(255, 235, 170, 0.8)';
      fctx.shadowBlur = 4;
      fctx.beginPath();
      fctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      fctx.fill();
    }
  }
  fctx.shadowBlur = 0;

  // 3. Golden Confetti
  for (let i = confetti.length - 1; i >= 0; i--) {
    const c = confetti[i];
    c.y += c.vy;
    c.x += Math.sin(c.y * 0.02) * 0.8 + c.vx;
    c.rot += c.vRot;

    if (c.y > H + 20) {
      confetti.splice(i, 1);
      continue;
    }

    fctx.save();
    fctx.translate(c.x, c.y);
    fctx.rotate((c.rot * Math.PI) / 180);
    fctx.fillStyle = c.color;
    fctx.globalAlpha = c.alpha;
    fctx.shadowColor = 'rgba(243, 217, 138, 0.5)';
    fctx.shadowBlur = 5;
    fctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
    fctx.restore();
  }
}

/* Stars Array */
let stars = [];

function generateStars(){
  stars = Array.from({length: 350}, () => ({
    x: Math.random()*W,
    y: Math.random()*H,
    r: Math.random()*1.5 + 0.5,
    tw: Math.random()*Math.PI*2,
    speed: Math.random()*0.02 + 0.005,
    vy: Math.random() * 2 + 1
  }));
}
generateStars();

function drawSky(now){
  // Interpolate Mouse Smoothness
  mouse.x += (mouse.targetX - mouse.x) * 0.05;
  mouse.y += (mouse.targetY - mouse.y) * 0.05;

  const offsetX = mouse.isDesktop ? (mouse.x - W / 2) / (W / 2) : 0;
  const offsetY = mouse.isDesktop ? (mouse.y - H / 2) / (H / 2) : 0;

  sctx.clearRect(0, 0, W, H);
  sctx.fillStyle = '#05060c';
  sctx.fillRect(0, 0, W, H);

  // Aurora Sky Overlay
  if(state.auroraActive){
    if(state.auroraAlpha < 1) state.auroraAlpha += 0.01;
    drawAurora(now);
  }

  // Handle Stars Collapse Animation
  if(state.isCollapsing){
    state.collapseProgress += 0.02;
    for(let i = 0; i < stars.length; i++){
      const s = stars[i];
      s.y += s.vy * (1 + state.collapseProgress * 3);
      sctx.fillStyle = `rgba(255, 250, 235, ${Math.max(0, 1 - state.collapseProgress)})`;
      sctx.beginPath(); sctx.arc(s.x, s.y, s.r, 0, Math.PI*2); sctx.fill();
    }
  } else {
    // 1. Draw single first star
    if(state.firstStarVisible && stars.length > 0){
      const fs = stars[0];
      fs.tw += 0.02;
      const a = 0.5 + Math.sin(fs.tw)*0.5;
      sctx.fillStyle = `rgba(255, 250, 235, ${a})`;
      sctx.beginPath();
      sctx.arc(W * 0.5, H * 0.25, 2.5, 0, Math.PI*2);
      sctx.fill();
    }

    // 2. Draw Moon (with Cursor Parallax)
    if(state.moonVisible){
      if(state.moonAlpha < 1) state.moonAlpha += 0.01;
      const mx = W * 0.75 + offsetX * 22;
      const my = H * 0.2 + offsetY * 15;
      
      const mg = sctx.createRadialGradient(mx, my, 5, mx, my, 60);
      mg.addColorStop(0, `rgba(255, 248, 225, ${0.4 * state.moonAlpha})`);
      mg.addColorStop(1, "rgba(255, 248, 225, 0)");
      sctx.fillStyle = mg;
      sctx.beginPath(); sctx.arc(mx, my, 60, 0, Math.PI*2); sctx.fill();

      sctx.beginPath();
      sctx.fillStyle = `rgba(251, 243, 221, ${state.moonAlpha})`;
      sctx.arc(mx, my, 28, 0, Math.PI*2);
      sctx.fill();
    }

    // 3. Draw Countless Stars
    if(state.targetStarsCount > 0){
      if(state.starsCount < state.targetStarsCount) state.starsCount += 2;
      for(let i = 1; i < Math.min(state.starsCount, stars.length); i++){
        const s = stars[i];
        s.tw += s.speed;
        const a = 0.3 + Math.sin(s.tw)*0.5;
        sctx.fillStyle = `rgba(255, 250, 235, ${a})`;
        sctx.beginPath(); sctx.arc(s.x, s.y, s.r, 0, Math.PI*2); sctx.fill();
      }
    }
  }

  // 4. Draw Heart Constellation
  if(state.constellationReady && state.constellationVisible){
    drawHeartConstellation(now);
  }

  // 5. Draw "I love you infinitely" Constellation Cluster Formation
  if(state.endingConstellationActive){
    drawEndingConstellationCluster(now);
  }

  // 6. Draw Silhouetted Trees Horizon (with Counter Parallax)
  drawTreeHorizon(offsetX);

  // 7. Update Glowing FX (Cursor Dust, Fireworks, Confetti)
  updateAndDrawFX();
}

function drawTreeHorizon(offsetX){
  sctx.save();
  const treeShift = -offsetX * 12;
  sctx.fillStyle = '#020306';
  
  const baseH = H;
  const numTrees = Math.ceil(W / 28) + 2;

  sctx.beginPath();
  sctx.moveTo(0, baseH);
  for(let i = -1; i <= numTrees; i++){
    const x = i * 28 + treeShift;
    const treeHeight = 35 + (i % 3) * 12 + (i % 5) * 8;
    
    sctx.lineTo(x, baseH - treeHeight);
    sctx.lineTo(x + 14, baseH - treeHeight - 18);
    sctx.lineTo(x + 28, baseH - treeHeight);
  }
  sctx.lineTo(W + 50, baseH);
  sctx.closePath();
  sctx.fill();
  sctx.restore();
}

function drawAurora(now){
  const t = now * 0.0008;
  const alpha = state.auroraAlpha;

  sctx.save();
  sctx.globalCompositeOperation = 'screen';

  // Wave 1 Green/Teal
  const g1 = sctx.createLinearGradient(0, H * 0.2, 0, H * 0.85);
  g1.addColorStop(0, 'rgba(0, 0, 0, 0)');
  g1.addColorStop(0.5, `rgba(46, 213, 160, ${0.4 * alpha})`);
  g1.addColorStop(1, 'rgba(0, 0, 0, 0)');
  
  sctx.fillStyle = g1;
  sctx.beginPath();
  sctx.moveTo(0, H * 0.5);
  for(let x = 0; x <= W; x += 30){
    const y = H * 0.45 + Math.sin(x * 0.003 + t) * 60 + Math.cos(x * 0.002 - t) * 30;
    sctx.lineTo(x, y);
  }
  sctx.lineTo(W, H); sctx.lineTo(0, H);
  sctx.closePath();
  sctx.fill();

  // Wave 2 Purple
  const g2 = sctx.createLinearGradient(0, H * 0.3, 0, H * 0.9);
  g2.addColorStop(0, 'rgba(0, 0, 0, 0)');
  g2.addColorStop(0.5, `rgba(168, 85, 247, ${0.35 * alpha})`);
  g2.addColorStop(1, 'rgba(0, 0, 0, 0)');

  sctx.fillStyle = g2;
  sctx.beginPath();
  sctx.moveTo(0, H * 0.55);
  for(let x = 0; x <= W; x += 30){
    const y = H * 0.5 + Math.cos(x * 0.004 - t * 1.2) * 70 + Math.sin(x * 0.0015 + t) * 40;
    sctx.lineTo(x, y);
  }
  sctx.lineTo(W, H); sctx.lineTo(0, H);
  sctx.closePath();
  sctx.fill();

  sctx.restore();
}

function drawHeartConstellation(now){
  const cx = W/2, cy = H*0.42, scale = Math.min(W,H)*0.22;
  const pts = [];
  for(let t=0; t<Math.PI*2; t+=0.18){
    const x = 16*Math.pow(Math.sin(t),3);
    const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
    pts.push([cx + x*scale/16, cy - y*scale/16]);
  }
  const reveal = Math.min(1, (now - state.constellationStart)/2000);
  const count = Math.floor(pts.length * reveal);
  
  for(let i=0; i<count; i++){
    const [px, py] = pts[i];
    sctx.fillStyle = '#fff7db';
    sctx.shadowColor = 'rgba(243,217,138,0.95)';
    sctx.shadowBlur = 8;
    sctx.beginPath();
    sctx.arc(px, py, 2.2, 0, Math.PI*2);
    sctx.fill();
  }
  sctx.shadowBlur = 0;

  if(reveal >= 1 && !state.constellationFormed){
    state.constellationFormed = true;
    document.getElementById('me-you-label').style.opacity = '1';
    
    setTimeout(() => {
      goToCakeScene();
    }, 2200);
  }
}

function generateEndingTextPoints(){
  const tempCanvas = document.createElement('canvas');
  const tctx = tempCanvas.getContext('2d');
  tempCanvas.width = W;
  tempCanvas.height = H;

  const fontSize = Math.min(W * 0.075, 52);
  tctx.font = `italic 800 ${fontSize}px 'Playfair Display', serif`;
  tctx.fillStyle = '#ffffff';
  tctx.textAlign = 'center';
  tctx.textBaseline = 'middle';
  tctx.fillText("I love you infinitely.", W / 2, H * 0.45);

  const imgData = tctx.getImageData(0, 0, W, H).data;
  const pts = [];
  const step = Math.max(2, Math.floor(W / 320));

  for(let y = 0; y < H; y += step){
    for(let x = 0; x < W; x += step){
      const index = (y * W + x) * 4;
      if(imgData[index + 3] > 120){
        const startAngle = Math.random() * Math.PI * 2;
        const startDist = Math.random() * Math.max(W, H) * 0.6;
        pts.push({
          targetX: x,
          targetY: y,
          startX: x + Math.cos(startAngle) * startDist,
          startY: y + Math.sin(startAngle) * startDist,
          tw: Math.random() * Math.PI * 2,
          r: Math.random() * 1.5 + 1.2
        });
      }
    }
  }
  state.endingPoints = pts;
}

function drawEndingConstellationCluster(now){
  const duration = 3500;
  const progress = Math.min(1, (now - state.endingStart) / duration);
  const easeProgress = 1 - Math.pow(1 - progress, 3);

  for(let i = 0; i < state.endingPoints.length; i++){
    const p = state.endingPoints[i];
    const currX = p.startX + (p.targetX - p.startX) * easeProgress;
    const currY = p.startY + (p.targetY - p.startY) * easeProgress;

    p.tw += 0.04;
    const glow = 0.7 + Math.sin(p.tw) * 0.3;

    sctx.fillStyle = `rgba(255, 235, 170, ${glow})`;
    sctx.shadowColor = 'rgba(255, 220, 130, 1)';
    sctx.shadowBlur = 12;
    sctx.beginPath();
    sctx.arc(currX, currY, p.r, 0, Math.PI * 2);
    sctx.fill();
  }
  sctx.shadowBlur = 0;
}

function loop(now){
  drawSky(now);
  requestAnimationFrame(loop);
}

/* Cake Scene Logic */
function goToCakeScene(){
  state.constellationVisible = false;
  document.getElementById('me-you-label').style.opacity = '0';

  document.getElementById('scene-cake').classList.add('active');
  document.getElementById('cake-wrap').classList.add('show');

  startMicListen();
}

async function startMicListen(){
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const src = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    
    let blowCounter = 0;
    function check(){
      analyser.getByteFrequencyData(data);
      
      let totalVolume = 0;
      let highFreqVolume = 0;
      
      for(let i = 0; i < data.length; i++){
        totalVolume += data[i];
        if(i > data.length * 0.4) highFreqVolume += data[i];
      }
      
      const avgVol = totalVolume / data.length;
      const avgHigh = highFreqVolume / (data.length * 0.6);

      if(avgVol > 18 && avgHigh > 12){
        blowCounter++;
      } else {
        blowCounter = Math.max(0, blowCounter - 1);
      }

      if(blowCounter >= 3){
        blowOutCandles();
        stream.getTracks().forEach(t => t.stop());
        ctx.close();
        return;
      }
      requestAnimationFrame(check);
    }
    check();
  } catch(err) {
    document.getElementById('cake-hint').textContent = "Microphone access required to blow candles.";
  }
}

function blowOutCandles(){
  document.querySelectorAll('.flame').forEach(f => f.classList.add('out'));
  document.getElementById('cake-hint').textContent = '';

  const cakeWrap = document.getElementById('cake-wrap');
  cakeWrap.style.opacity = '0';
  cakeWrap.style.transform = 'scale(0.85) translateY(20px)';

  setTimeout(()=>{
    document.getElementById('scene-cake').classList.remove('active');
    triggerCelebration();
  }, 1000);
}

function fadeAudioTransition() {
  const audio1 = document.getElementById('audio-glue');
  const audio2 = document.getElementById('audio-honeybee');

  // Start playing Honeybee in the background at volume 0
  audio2.volume = 0;
  audio2.play().catch(() => {});

  let fadeVolume = 1;
  const fadeInterval = setInterval(() => {
    fadeVolume -= 0.05;

    if (fadeVolume <= 0) {
      clearInterval(fadeInterval);
      audio1.pause();
      audio1.volume = 1; // Reset volume for audio 1
      audio2.volume = 1; // Full volume for audio 2
    } else {
      audio1.volume = Math.max(0, fadeVolume);
      audio2.volume = Math.min(1, 1 - fadeVolume);
    }
  }, 100); // Fades over ~2 seconds
}

function releaseBalloons(){
  const colors = ['rgba(243,217,138,0.85)', 'rgba(255,255,255,0.85)', 'rgba(238,217,183,0.85)', 'rgba(217,180,106,0.85)'];
  for(let i=0; i<18; i++){
    const b = document.createElement('div');
    b.className = 'balloon';
    b.style.left = (Math.random()*88 + 6) + 'vw';
    b.style.animationDelay = (Math.random()*2) + 's';
    b.style.background = colors[Math.floor(Math.random()*colors.length)];
    document.body.appendChild(b);
    setTimeout(()=> b.remove(), 7500);
  }
}
